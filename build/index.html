    /* Font metric overrides to prevent layout shifts */

    /* Smooth transition when fonts load */
    .wf-active .font-inter {

      transition: font-family 0.1s ease-in-out;
    }
    .wf-active .font-noto-serif {

    }
    .wf-active .font-material-symbols {
