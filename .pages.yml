media:
  input: public/images
  output: ""

content:
  # SECTION 1: The Hero (Single File)
  - name: hero
    label: "Home Hero (Featured Book)"
    type: file
    path: public/content/hero.json
    format: json
    fields:
      - { name: title, label: "Featured Book Title", type: string }
      - { name: cover, label: "Large Hero Image", type: image }
      - { name: mobileCover, label: "Mobile Hero Image", type: image }
      - { name: blurb, label: "Short Teaser Text", type: rich-text }
      - { name: buttonText, label: "Button Text", type: string }
      - { name: link, label: "Primary Buy Link", type: string }
      - { name: bookStatus, label: "Book Status", type: select, options: { values: [{ value: "coming-soon", label: "New Release Coming Soon" }, { value: "new-release", label: "Just Released" }, { value: "bestseller", label: "Bestselling Book" }, { value: "available", label: "Available Now" }, { value: "none", label: "Hide Status" }] } }
      - { name: showSpecificDate, label: "Show Specific Release Date", type: boolean, default: false }
      - { name: releaseDate, label: "Release Date", type: date }
      - { name: customDateText, label: "Custom Date Text (Optional)", type: string }

  # SECTION 2: Books (Collection)
  - name: books
    label: "Books"
    type: collection
    path: public/content/books
    format: json
    filename: "{fields.slug}.json"
    fields:
      - { name: title, label: "Book Title", type: string }
      - { name: slug, label: "URL Slug", type: string }
      - { name: releaseDate, label: "Release Date", type: date }
      - { name: description, label: "Description", type: text }
      - { name: body, label: "Extended Content", type: rich-text }
      - { name: image, label: "Book Cover Image", type: image }
      - { name: amazonUrl, label: "Amazon Purchase URL", type: string }
      - { name: featured, label: "Featured Book", type: boolean, default: false }
      - { name: authorship, label: "Authorship", type: select, options: { values: [{ value: "author", label: "By Edmond A Porter" }, { value: "contributor", label: "Featuring Edmond A Porter" }] }, default: "author" }
      - name: seo
        label: "SEO Metadata"
        type: object
        fields:
          - { name: metaTitle, label: "Meta Title", type: string }
          - { name: metaDescription, label: "Meta Description", type: string }

  # SECTION 3: Home Bio Teaser (Single File)
  - name: home-bio
    label: "Home Page Bio Teaser"
    type: file
    path: public/content/home-bio.json
    format: json
    fields:
      - { name: teaserHeadline, label: "Teaser Headline", type: string }
      - { name: teaserBody, label: "Teaser Body Text", type: rich-text }
      - { name: teaserImage, label: "Teaser Image", type: image }
      - { name: readMoreLink, label: "Read More Link Text", type: string }

  # SECTION 4: About Page Bio (Single File)
  - name: about-bio
    label: "About Page Bio"
    type: file
    path: public/content/about-bio.json
    format: json
    fields:
      - { name: bioLabel, label: "Bio Label", type: string }
      - { name: bioHeadline, label: "Bio Headline", type: string }
      - { name: bioSubtitle, label: "Bio Subtitle", type: string }
      - { name: bioBody, label: "Full Bio Body", type: rich-text }
      - { name: bioImage, label: "Bio Image", type: image }
      - name: seo
        label: "SEO Metadata"
        type: object
        fields:
          - { name: metaTitle, label: "Meta Title", type: string, description: "Title shown in browser tabs and search results" }
          - { name: metaDescription, label: "Meta Description", type: text, description: "Description shown in search engine results" }
          - { name: ogTitle, label: "OpenGraph Title", type: string, description: "Title for social media sharing" }
          - { name: ogDescription, label: "OpenGraph Description", type: text, description: "Description for social media sharing" }
          - { name: ogImage, label: "OpenGraph Image", type: image, description: "Image for social media sharing" }

  # SECTION 5: Timeline Milestones (Collection)
  - name: timeline
    label: "Timeline Milestones"
    type: collection
    path: public/content/timeline
    format: json
    filename: "{fields.year}.json"
    create: true
    fields:
      - { name: year, label: "Year", type: string }
      - { name: milestone1_title, label: "Milestone 1 Title", type: string }
      - { name: milestone1_description, label: "Milestone 1 Description", type: rich-text }
      - { name: milestone2_title, label: "Milestone 2 Title", type: string }
      - { name: milestone2_description, label: "Milestone 2 Description", type: rich-text }
      - { name: milestone3_title, label: "Milestone 3 Title", type: string }
      - { name: milestone3_description, label: "Milestone 3 Description", type: rich-text }

  # SECTION 6: Medium Section (Single File)
  - name: medium-section
    label: "Medium Section Content"
    type: file
    path: public/content/medium-section.json
    format: json
    fields:
      - { name: headline, label: "Section Headline", type: string }
      - { name: description, label: "Section Description", type: rich-text }
      - { name: posts, label: "Medium Posts (Future)", type: collection, fields: [{ name: title, label: "Post Title", type: string }, { name: link, label: "Post URL", type: string }, { name: description, label: "Post Description", type: rich-text }] }

  # SECTION 7: Generic Pages (Collection)
  - name: pages
    label: "Generic Pages"
    type: collection
    path: public/content/pages
    format: json
    filename: "{fields.slug}.json"
    fields:
      - { name: title, label: "Page Title", type: string }
      - { name: slug, label: "URL Slug", type: string }
      - { name: body, label: "Page Content", type: markdown }
      - name: seo
        label: "SEO Metadata"
        type: object
        fields:
          - { name: metaTitle, label: "Meta Title", type: string }
          - { name: metaDescription, label: "Meta Description", type: string }