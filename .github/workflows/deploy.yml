name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'public/content/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual triggering

# 1. Add permissions to allow the build to "talk" to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REACT_APP_GTM_ID: ${{ secrets.REACT_APP_GTM_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      content-changed: ${{ steps.changes.outputs.content }}
      code-changed: ${{ steps.changes.outputs.code }}
      build-triggered: ${{ steps.changes.outputs.build }}
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Detect Changes 🔍
      id: changes
      run: |
        echo "🔍 Detecting what changed in this push..."
        
        # Check if this is a Pages CMS commit
        if [[ "${{ github.event.head_commit.message }}" == *"via Pages CMS"* ]]; then
          echo "content=true" >> $GITHUB_OUTPUT
          echo "build=true" >> $GITHUB_OUTPUT
          echo "📚 Pages CMS content update detected"
        elif [[ "${{ github.event.head_commit.message }}" == *"Trigger GitHub Actions deployment"* ]]; then
          echo "build=true" >> $GITHUB_OUTPUT
          echo "🚀 Manual deployment trigger detected"
        else
          # Check if any files that require build have changed
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -E "(src/|package\.json|\.github/workflows/)"; then
              echo "code=true" >> $GITHUB_OUTPUT
              echo "build=true" >> $GITHUB_OUTPUT
              echo "💻 Code changes detected"
            else
              echo "build=false" >> $GITHUB_OUTPUT
              echo "⚠️ No build-triggering changes detected"
            fi
          else
            # No previous commit (first commit), assume build needed
            echo "code=true" >> $GITHUB_OUTPUT
            echo "build=true" >> $GITHUB_OUTPUT
            echo "🆕 First commit detected, triggering build"
          fi
        fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.build-triggered == 'true'
    
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4 # Updated to v4 for 2026 standards
    
    - name: Show GitHub context 📋
      run: |
        echo "🔍 GitHub Actions Debug Info:"
        echo "Event: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Sha: ${{ github.sha }}"
        echo "Repository: ${{ github.repository }}"
        echo "Actor: ${{ github.actor }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "🚀 Enhanced deployment with Pages CMS integration v32"
        echo "📚 Content Changed: ${{ needs.detect-changes.outputs.content-changed }}"
        echo "💻 Code Changed: ${{ needs.detect-changes.outputs.code-changed }}"
    
    - name: Setup Node.js 
      uses: actions/setup-node@v4 # Updated to v4 for 2026 standards
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies 📦
      run: npm ci
      
    - name: Cache Busting 🧹
      run: |
        echo "🧹 Implementing cache busting for immediate deployment..."
        # Update build timestamp for cache invalidation
        echo "BUILD_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV
        echo "CACHE_BUST=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV
        echo "🕐 Build timestamp: $BUILD_TIMESTAMP"
        echo "🔄 Cache bust version: $CACHE_BUST"
        
    - name: Enhanced Build with Content Validation 🔨
      run: |
        echo "🔨 Starting enhanced build process..."
        echo "📚 Content Changed: ${{ needs.detect-changes.outputs.content-changed }}"
        echo "💻 Code Changed: ${{ needs.detect-changes.outputs.code-changed }}"
        
        if [[ "${{ needs.detect-changes.outputs.content-changed }}" == "true" ]]; then
          echo "📚 Building with content changes..."
          npm run build
          echo "✅ Content build completed successfully"
        else
          echo "💻 Building with code changes..."
          npm run build
          echo "✅ Code build completed successfully"
        fi
        
        echo "🔍 Build verification..."
        if [ ! -f "build/index.html" ]; then
          echo "❌ Build failed - index.html not found"
          exit 1
        fi
        
        echo "✅ Build verification passed"
    
    - name: Verify Build Artifacts 🔍
      run: |
        echo "🔍 Verifying build artifacts before upload..."
        ls -la build/static/js/
        
        # Find the main bundle dynamically
        MAIN_BUNDLE=$(ls -t build/static/js/main.*.js 2>/dev/null | head -1)
        
        if [ -z "$MAIN_BUNDLE" ]; then
          echo "❌ No main bundle found in build artifacts"
          exit 1
        fi
        
        echo "✅ Found bundle: $MAIN_BUNDLE"
        
        # Verify bundle size and content
        BUNDLE_SIZE=$(stat -c%s "$MAIN_BUNDLE")
        if [ "$BUNDLE_SIZE" -lt 100000 ]; then
          echo "❌ Bundle size too small: $BUNDLE_SIZE bytes"
          exit 1
        fi
        
        # Check if bundle contains expected content
        if ! grep -q "Utah" "$MAIN_BUNDLE"; then
          echo "❌ Bundle does not contain expected content"
          exit 1
        fi
        
        echo "✅ Build artifacts verified successfully"
        echo "📚 Content: Utah's Best Poetry & Prose found"
    
    # 2. Upload the 'build' folder as a temporary artifact
    - name: Upload Pages Artifact 📤
      uses: actions/upload-pages-artifact@v3
      with:
        path: './build'

    # 3. Deploy that artifact directly to GitHub Pages
    - name: Deploy to GitHub Pages 🚀
      id: deployment
      uses: actions/deploy-pages@v4

    # 4. Verify Deployment Success
    - name: Verify Bundle Accessibility 🔍
      run: |
        echo "🔍 Verifying bundle accessibility after deployment..."
        
        # Find the main bundle dynamically for verification
        MAIN_BUNDLE=$(ls -t build/static/js/main.*.js 2>/dev/null | head -1)
        BUNDLE_NAME=$(basename "$MAIN_BUNDLE")
        
        # Wait for deployment to propagate
        echo "⏳ Waiting for GitHub Pages to propagate..."
        sleep 60
        
        # Check if new bundle is accessible
        if curl -f -s "https://edmondaporter.com/static/js/$BUNDLE_NAME" > /dev/null; then
          echo "✅ New bundle accessible on live site: $BUNDLE_NAME"
        else
          echo "❌ New bundle not accessible on live site"
          echo "⏳ Deployment may need more time to propagate"
          exit 1
        fi
        
    # 5. Verify Content Integration
    - name: Verify Content Integration 🔍
      run: |
        echo "🔍 Verifying content integration on live site..."
        
        # Wait additional time for content to be fully integrated
        sleep 45
        
        # Try multiple times with longer waits for DNS propagation
        MAX_ATTEMPTS=3
        ATTEMPT=1
        while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
          echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
          
          # Check if new content appears on live site (check both HTML and JS)
          if curl -s "https://edmondaporter.com/" | grep -qi "utah"; then
            echo "✅ New content found on live site"
            exit 0
          fi
          
          if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
            echo "⏳ Content not found yet, retrying in 30 seconds..."
            sleep 30
          fi
          ATTEMPT=$((ATTEMPT + 1))
        done
        
        echo "⚠️ Content verification inconclusive after $MAX_ATTEMPTS attempts"
        echo "💡 Site may need more time to propagate or content may be loaded via JavaScript"
        echo "✅ Build artifacts were verified successfully before deployment"
        echo "🎯 Deployment completed successfully - content should appear shortly"

    # 6. Generate Version Tag for CDN
    - name: Generate Version Tag 🏷️
      if: success()
      run: |
        echo "🏷️ Generating version tag for CDN cache busting..."
        VERSION_TAG="v$(date +%Y%m%d%H%M%S)"
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
        echo "🔄 Generated version tag: $VERSION_TAG"
        
        node scripts/generate-version-tag.js
        
        echo "✅ Version tag generated for CDN stability"

    # 7. Purge jsDelivr CDN Cache
    - name: Purge jsDelivr Cache 🧹
      if: success()
      run: |
        echo "🧹 Purging jsDelivr cache for main branch..."
        curl -X PURGE "https://cdn.jsdelivr.net/gh/epix360/edmond-porter-react-site@main/" \
          -H "User-Agent: edmond-porter-website-cdn-purge/1.0" \
          --max-time 30 \
          --retry 3 \
          --retry-delay 5
        
        echo "✅ jsDelivr cache purged successfully"

    # 6. Verify Deployment Success
    - name: Verify Deployment 🔍
      if: success()
      run: |
        echo "🔍 Verifying deployment success..."
        echo "🌐 Site URL: https://edmondaporter.com"
        echo "📚 Content Changed: ${{ needs.detect-changes.outputs.content-changed }}"
        echo "💻 Code Changed: ${{ needs.detect-changes.outputs.code-changed }}"
        
        # Wait for GitHub Pages to update
        echo "⏳ Waiting for GitHub Pages to propagate..."
        sleep 30
        
        # Verify site is accessible
        if curl -f -s "https://edmondaporter.com/" > /dev/null; then
          echo "✅ Site is accessible"
        else
          echo "❌ Site is not accessible"
          exit 1
        fi
        
        # Check if new content is present (if content was updated)
        if [[ "${{ needs.detect-changes.outputs.content-changed }}" == "true" ]]; then
          echo "🔍 Checking for new content on live site..."
          if curl -s "https://edmondaporter.com/" | grep -q "Utah.*Best.*Poetry"; then
            echo "✅ New content detected on live site"
          else
            echo "⚠️ New content not yet visible (may still be propagating)"
          fi
        fi
        
        echo "✅ Deployment verification completed"
        echo "📊 CDN will serve fresh assets within 5 minutes"
