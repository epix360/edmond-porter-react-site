name: Deploy to GitHub Pages

on:
  push:
    branches: 
      - main

    paths:
      - 'public/content/**'
      - 'src/**'
      - 'app/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Allow manual triggering

# 1. Add permissions to allow the build to "talk" to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
  REACT_APP_GTM_ID: ${{ secrets.REACT_APP_GTM_ID }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      content-changed: ${{ steps.changes.outputs.content }}
      code-changed: ${{ steps.changes.outputs.code }}
      build-triggered: ${{ steps.changes.outputs.build }}
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Detect Changes 🔍
      id: changes
      run: |
        echo "🔍 Detecting what changed in this push..."
        
        # Check if this is a Pages CMS commit
        if [[ "${{ github.event.head_commit.message }}" == *"via Pages CMS"* ]]; then
          echo "content=true" >> $GITHUB_OUTPUT
          echo "build=true" >> $GITHUB_OUTPUT
          echo "📚 Pages CMS content update detected"
        elif [[ "${{ github.event.head_commit.message }}" == *"Trigger GitHub Actions deployment"* ]]; then
          echo "build=true" >> $GITHUB_OUTPUT
          echo "build=true" >> $GITHUB_OUTPUT
          echo "🚀 Manual deployment trigger detected"
        else
          # Efficient change detection - check only what matters
          if git diff --name-only HEAD~1 HEAD | grep -E 'src/|app/|package\.json|\.github/workflows/'; then
            echo "code=true" >> $GITHUB_OUTPUT
            echo "build=true" >> $GITHUB_OUTPUT
            echo "💻 Code changes detected"
          else
            echo "build=false" >> $GITHUB_OUTPUT
            echo "build=false" >> $GITHUB_OUTPUT
            echo "⚠️ No build-triggering changes detected"
          fi
        fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: detect-changes
    
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v4 # Updated to v4 for 2026 standards
    
    - name: Show GitHub context 📋
      run: |
        echo "🔍 GitHub Actions Debug Info:"
        echo "Event: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Sha: ${{ github.sha }}"
        echo "Repository: ${{ github.repository }}"
        echo "Actor: ${{ github.actor }}"
        echo "Workflow: ${{ github.workflow }}"
        echo "Run ID: ${{ github.run_id }}"
        echo "🚀 Enhanced deployment with Pages CMS integration v32"
        echo "📚 Content Changed: ${{ needs.detect-changes.outputs.content-changed }}"
        echo "💻 Code Changed: ${{ needs.detect-changes.outputs.code-changed }}"
    
    - name: Setup Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
          
    - name: Install dependencies 📦
      run: npm install
      
    - name: Build Info 📝
      run: |
        echo "� Build starting at $(date)"
        
    - name: Enhanced Build with Content Validation 🔨
      run: |
        echo "🔨 Starting optimized build process..."
        echo "📚 Content Changed: ${{ needs.detect-changes.outputs.content-changed }}"
        echo "💻 Code Changed: ${{ needs.detect-changes.outputs.code-changed }}"
        
        # Run optimized Next.js build
        npm run build:next
        
        echo "✅ Build completed successfully!"
        echo "⏱️ Build time: $SECONDS seconds"
    
    - name: Upload Pages Artifact 📤
      uses: actions/upload-pages-artifact@v3
      with:
        path: './out'
        
    # 3. Deploy that artifact directly to GitHub Pages
    - name: Deploy to GitHub Pages 🚀
      uses: actions/deploy-pages@v4

    # 4. Verify Deployment Success
    - name: Deployment Summary �
      run: |
        echo "🎉 Deployment completed successfully!"
        echo "📚 Books deployed: $(jq 'length' "public/content/books-index.json")"
        echo "🌐 Site URL: https://edmondaporter.com"
        echo "⏱️ Build time: $SECONDS seconds"

    # 5. Quick Content Check (non-blocking, content-only changes)
    - name: Quick Content Check 🔍
      if: needs.detect-changes.outputs.content-changed == 'true'
      continue-on-error: true
      run: |
        echo "🔍 Quick content check (non-blocking)..."
        sleep 10
        if curl -s "https://edmondaporter.com/" | grep -qi "utah"; then
          echo "✅ Content appears to be live"
        else
          echo "⏳ Content may still be propagating (this is normal)"
        fi

    # 6. Generate Version Tag for CDN
    - name: Generate Version Tag 🏷️
      if: success()
      run: |
        echo "🏷️ Generating version tag for CDN cache busting..."
        VERSION_TAG="v$(date +%Y%m%d%H%M%S)"
        echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
        echo "🔄 Generated version tag: $VERSION_TAG"
        
        node scripts/generate-version-tag.js
        
        echo "✅ Version tag generated for CDN stability"

    # 7. Purge jsDelivr CDN Cache (fire-and-forget, content-only)
    - name: Purge jsDelivr Cache 🧹
      if: success() && needs.detect-changes.outputs.content-changed == 'true'
      continue-on-error: true
      run: |
        echo "🧹 Purging jsDelivr cache (async)..."
        curl -X PURGE "https://cdn.jsdelivr.net/gh/epix360/edmond-porter-react-site@main/" \
          -H "User-Agent: edmond-porter-website-cdn-purge/1.0" \
          --max-time 10 \
          --silent &
        echo "✅ CDN purge initiated (may take a few minutes to propagate)"

    # 6. Quick Deployment Verification
    - name: Verify Deployment 🔍
      if: success()
      continue-on-error: true
      run: |
        echo "🔍 Quick deployment check..."
        echo "🌐 Site URL: https://edmondaporter.com"
        
        # Quick check site is accessible
        if curl -f -s --max-time 10 "https://edmondaporter.com/" > /dev/null; then
          echo "✅ Site is accessible"
        else
          echo "⏳ Site may still be propagating (this is normal for GitHub Pages)"
        fi
        
        echo "✅ Deployment complete"
